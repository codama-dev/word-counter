<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Favicons (early in head so tab icon shows immediately) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="48x48 32x32 16x16" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />

    <!-- PRIMARY META -->
    <title>Free Word Counter | Count Words, Characters & Sentences Online</title>
    <meta name="description" content="Count words, characters, sentences, and paragraphs instantly. Estimate reading time. Track keyword density. 100% free, no signup." />
    <meta name="keywords" content="word counter, character counter, word count, letter counter, text counter, word count tool, online word counter, character count" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://free-word-counter.codama.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Free Word Counter | Count Words, Characters & Sentences Online" />
    <meta property="og:description" content="Count words, characters, sentences, and paragraphs instantly. Estimate reading time. Track keyword density. 100% free, no signup." />
    <meta property="og:url" content="https://free-word-counter.codama.dev/" />
    <meta property="og:site_name" content="Free Word Counter" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Word Counter | Count Words, Characters & Sentences Online" />
    <meta name="twitter:description" content="Count words, characters, sentences, and paragraphs instantly. Estimate reading time. Track keyword density. 100% free, no signup." />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Free Word Counter",
        "description": "Count words, characters, sentences, and paragraphs instantly. Estimate reading time. Track keyword density. 100% free, no signup.",
        "url": "https://free-word-counter.codama.dev/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Count words, characters, sentences, and paragraphs",
          "Estimate reading and speaking time",
          "Keyword density analysis",
          "Top keywords extraction",
          "No registration, no limits, works in browser"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
